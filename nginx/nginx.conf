events {}

http {
    # Allow large audio file uploads (default 1 MB is too small)
    client_max_body_size 50M;

    server {
        listen 80;
        server_name _;

        # ── Backend API  (/api/v1/...) ──────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend:8001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Long timeout for report generation
            proxy_read_timeout 120s;
        }

        # ── AI Engine API  (/v1/consultations/...) ──────────────────────────
        location /v1/ {
            proxy_pass         http://ai_engine:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Long timeout for audio transcription + SOAP generation
            proxy_read_timeout 300s;
        }

        # ── Frontend  (everything else) ─────────────────────────────────────
        location / {
            proxy_pass         http://frontend:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}

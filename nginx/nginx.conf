events {}

http {
    # Allow large audio file uploads (default 1 MB is too small)
    client_max_body_size 50M;

    # Use Docker's internal DNS resolver; re-resolve every 30s so nginx
    # picks up new container IPs after restarts without needing its own restart.
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name _;

        # ── Backend API  (/api/v1/...) ──────────────────────────────────────
        location /api/ {
            set $backend http://backend:8001;
            proxy_pass         $backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Long timeout for report generation
            proxy_read_timeout 120s;
        }

        # ── AI Engine API  (/v1/consultations/...) ──────────────────────────
        location /v1/ {
            set $ai_engine http://ai_engine:8000;
            proxy_pass         $ai_engine;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Long timeout for audio transcription + SOAP generation
            proxy_read_timeout 300s;
        }

        # ── Frontend  (everything else) ─────────────────────────────────────
        location / {
            set $frontend http://frontend:3000;
            proxy_pass         $frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}

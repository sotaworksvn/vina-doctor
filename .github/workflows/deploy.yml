name: Deploy to ECS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'ai_engine/**'
      - 'Dockerfile'

concurrency:
  group: deploy-ecs
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: AI Engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/ai-engine:latest,${{ env.IMAGE_PREFIX }}/ai-engine:${{ github.sha }}
          cache-from: type=gha,scope=ai-engine
          cache-to: type=gha,mode=max,scope=ai-engine

      - name: Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:latest,${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:latest,${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=http://${{ secrets.ECS_HOST }}
            NEXT_PUBLIC_AI_ENGINE_URL=http://${{ secrets.ECS_HOST }}

  deploy:
    name: Deploy to ECS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Write .env to ECS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/ecs_key
          chmod 600 ~/.ssh/ecs_key
          ssh -i ~/.ssh/ecs_key -o StrictHostKeyChecking=no root@${{ secrets.ECS_HOST }} "mkdir -p /opt/vina-doctor"
          printf 'DASHSCOPE_API_KEY=%s\nSECRET_KEY=%s\n' \
            '${{ secrets.DASHSCOPE_API_KEY }}' \
            '${{ secrets.SECRET_KEY }}' \
            | ssh -i ~/.ssh/ecs_key -o StrictHostKeyChecking=no root@${{ secrets.ECS_HOST }} "cat > /opt/vina-doctor/.env && chmod 600 /opt/vina-doctor/.env"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR,GITHUB_REPOSITORY,GITHUB_SHA
          script: |
            set -euo pipefail
            cd /opt/vina-doctor

            # Pull production compose file and nginx config from repo (fail on HTTP error)
            COMPOSE_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/compose.prod.yml"
            NGINX_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/nginx/nginx.conf"
            echo "Fetching $COMPOSE_URL"
            if ! curl -fsSL "$COMPOSE_URL" -o compose.prod.yml; then
              echo "ERROR: failed to download compose.prod.yml from $COMPOSE_URL"
              exit 1
            fi
            mkdir -p nginx
            echo "Fetching $NGINX_URL"
            if ! curl -fsSL "$NGINX_URL" -o nginx/nginx.conf; then
              echo "ERROR: failed to download nginx/nginx.conf from $NGINX_URL"
              exit 1
            fi

            # Validate compose file before running
            if ! docker compose -f compose.prod.yml config >/dev/null; then
              echo "ERROR: compose.prod.yml is invalid — dumping contents for debug:"
              sed -n '1,200p' compose.prod.yml || true
              exit 1
            fi

            # Login to GHCR
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            # Pull images with specific SHA tag for reproducibility
            export AI_ENGINE_IMAGE="ghcr.io/${GITHUB_REPOSITORY}/ai-engine:${GITHUB_SHA}"
            export BACKEND_IMAGE="ghcr.io/${GITHUB_REPOSITORY}/backend:${GITHUB_SHA}"
            export FRONTEND_IMAGE="ghcr.io/${GITHUB_REPOSITORY}/frontend:${GITHUB_SHA}"

            docker compose -f compose.prod.yml up -d --remove-orphans

            # Cleanup
            docker image prune -f

            echo "==> Deploy complete!"
            docker compose -f compose.prod.yml ps

name: Deploy to ECS

on:
  workflow_dispatch:
  push:
    tags: ['*']

concurrency:
  group: deploy-ecs
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: AI Engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/ai-engine:latest,${{ env.IMAGE_PREFIX }}/ai-engine:${{ github.sha }}
          cache-from: type=gha,scope=ai-engine
          cache-to: type=gha,mode=max,scope=ai-engine

      - name: Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:latest,${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:latest,${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=http://${{ secrets.ECS_HOST }}
            NEXT_PUBLIC_AI_ENGINE_URL=http://${{ secrets.ECS_HOST }}

  deploy:
    name: Deploy to ECS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Write .env to ECS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/ecs_key
          chmod 600 ~/.ssh/ecs_key
          ssh -i ~/.ssh/ecs_key -o StrictHostKeyChecking=no root@${{ secrets.ECS_HOST }} "mkdir -p /opt/vina-doctor"
          # Include SERVEO_DOMAIN from action variables — ensures the deploy host has the value available
          printf 'DASHSCOPE_API_KEY=%s\nSECRET_KEY=%s\nSERVEO_DOMAIN=%s\n' \
            '${{ secrets.DASHSCOPE_API_KEY }}' \
            '${{ secrets.SECRET_KEY }}' \
            '${{ vars.SERVEO_DOMAIN }}' \
            | ssh -i ~/.ssh/ecs_key -o StrictHostKeyChecking=no root@${{ secrets.ECS_HOST }} "cat > /opt/vina-doctor/.env && chmod 600 /opt/vina-doctor/.env"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          SERVEO_PRIVATE_KEY: ${{ secrets.SERVEO_PRIVATE_KEY }}
          SERVEO_DOMAIN: ${{ vars.SERVEO_DOMAIN }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR,GITHUB_REPOSITORY,GITHUB_SHA,SERVEO_PRIVATE_KEY,SERVEO_DOMAIN
          script: |
            set -euo pipefail
            cd /opt/vina-doctor
            mkdir -p scripts

            # Pull and run the deploy script from the repo
            DEPLOY_SCRIPT_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/scripts/deploy-ecs.sh"
            echo "Fetching $DEPLOY_SCRIPT_URL"
            if ! curl -fsSL "$DEPLOY_SCRIPT_URL" -o scripts/deploy-ecs.sh; then
              echo "ERROR: failed to download deploy-ecs.sh from $DEPLOY_SCRIPT_URL"
              exit 1
            fi
            chmod +x scripts/deploy-ecs.sh
            bash scripts/deploy-ecs.sh

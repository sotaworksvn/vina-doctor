name: Deploy to ECS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'ai_engine/**'
      - 'Dockerfile'

concurrency:
  group: deploy-ecs
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: AI Engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/ai-engine:latest,${{ env.IMAGE_PREFIX }}/ai-engine:${{ github.sha }}
          cache-from: type=gha,scope=ai-engine
          cache-to: type=gha,mode=max,scope=ai-engine

      - name: Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:latest,${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:latest,${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=http://${{ secrets.ECS_HOST }}
            NEXT_PUBLIC_AI_ENGINE_URL=http://${{ secrets.ECS_HOST }}

  deploy:
    name: Deploy to ECS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Write .env to ECS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/ecs_key
          chmod 600 ~/.ssh/ecs_key
          ssh -i ~/.ssh/ecs_key -o StrictHostKeyChecking=no root@${{ secrets.ECS_HOST }} "mkdir -p /opt/vina-doctor"
          printf 'DASHSCOPE_API_KEY=%s\nSECRET_KEY=%s\n' \
            '${{ secrets.DASHSCOPE_API_KEY }}' \
            '${{ secrets.SECRET_KEY }}' \
            | ssh -i ~/.ssh/ecs_key -o StrictHostKeyChecking=no root@${{ secrets.ECS_HOST }} "cat > /opt/vina-doctor/.env && chmod 600 /opt/vina-doctor/.env"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          SERVEO_PRIVATE_KEY: ${{ secrets.SERVEO_PRIVATE_KEY }}
          SERVEO_DOMAIN: ${{ secrets.SERVEO_DOMAIN }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR,GITHUB_REPOSITORY,GITHUB_SHA,SERVEO_PRIVATE_KEY,SERVEO_DOMAIN
          script: |
            set -euo pipefail
            cd /opt/vina-doctor

            # If Serveo secrets are provided, install the private key and create an autossh unit (do not start yet)
            if [ -n "${SERVEO_PRIVATE_KEY:-}" ] && [ -n "${SERVEO_DOMAIN:-}" ]; then
              echo "Installing Serveo private key and creating autossh systemd unit..."
              mkdir -p /root/.ssh
              umask 077
              # Preserve newlines in the secret when writing the key file
              printf '%s\n' "$SERVEO_PRIVATE_KEY" > /root/.ssh/serveo_vina
              chmod 600 /root/.ssh/serveo_vina
              # Install autossh if available
              if command -v apt-get >/dev/null 2>&1; then apt-get update && apt-get install -y autossh || true
              elif command -v yum >/dev/null 2>&1; then yum install -y autossh || true
              elif command -v apk >/dev/null 2>&1; then apk add --no-cache autossh || true
              fi
              # Create systemd unit; it will be enabled now but started after compose up
              cat > /etc/systemd/system/serveo-autossh.service <<EOF
[Unit]
Description=Autossh Serveo Tunnel
After=network.target docker.service

[Service]
User=root
Environment="AUTOSSH_GATETIME=0"
ExecStart=/usr/bin/autossh -M 0 -o ServerAliveInterval=60 -o ServerAliveCountMax=3 -i /root/.ssh/serveo_vina -N -R ${SERVEO_DOMAIN}:80:localhost:80 serveo.net
Restart=always
RestartSec=10

[Install]
WantedBy=multi-user.target
EOF
              systemctl daemon-reload || true
              systemctl enable serveo-autossh.service || true
            fi

            # Pull production compose file and nginx config from repo (fail on HTTP error)
            COMPOSE_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/docker-compose.yml"
            NGINX_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/nginx/nginx.conf"
            echo "Fetching $COMPOSE_URL"
            if ! curl -fsSL "$COMPOSE_URL" -o docker-compose.yml; then
              echo "ERROR: failed to download docker-compose.yml from $COMPOSE_URL"
              exit 1
            fi
            mkdir -p nginx
            echo "Fetching $NGINX_URL"
            if ! curl -fsSL "$NGINX_URL" -o nginx/nginx.conf; then
              echo "ERROR: failed to download nginx/nginx.conf from $NGINX_URL"
              exit 1
            fi

            # Validate compose file before running
            if ! docker compose -f docker-compose.yml config >/dev/null; then
              echo "ERROR: docker-compose.yml is invalid — dumping contents for debug:"
              sed -n '1,200p' docker-compose.yml || true
              exit 1
            fi

            # Login to GHCR
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            # Pull images with specific SHA tag for reproducibility
            export AI_ENGINE_IMAGE="ghcr.io/${GITHUB_REPOSITORY}/ai-engine:${GITHUB_SHA}"
            export BACKEND_IMAGE="ghcr.io/${GITHUB_REPOSITORY}/backend:${GITHUB_SHA}"
            export FRONTEND_IMAGE="ghcr.io/${GITHUB_REPOSITORY}/frontend:${GITHUB_SHA}"

            docker compose -f docker-compose.yml up -d --remove-orphans

            # If Serveo was configured, start/restart the autossh service now (after nginx is up)
            if [ -n "${SERVEO_PRIVATE_KEY:-}" ] && [ -n "${SERVEO_DOMAIN:-}" ]; then
              systemctl restart serveo-autossh.service || true
              sleep 2
              systemctl status serveo-autossh.service --no-pager || true
            fi

            # Cleanup
            docker image prune -f

            echo "==> Deploy complete!"
            docker compose -f docker-compose.yml ps

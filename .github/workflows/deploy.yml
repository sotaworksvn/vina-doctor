name: Deploy to ECS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-ecs
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: AI Engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/ai-engine:latest,${{ env.IMAGE_PREFIX }}/ai-engine:${{ github.sha }}
          cache-from: type=gha,scope=ai-engine
          cache-to: type=gha,mode=max,scope=ai-engine

      - name: Backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:latest,${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:latest,${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to ECS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            mkdir -p /opt/vina-doctor
            cd /opt/vina-doctor

            # Pull production compose file from repo
            curl -sL "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/compose.prod.yml" -o compose.prod.yml

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Pull images with specific SHA tag for reproducibility
            SHA="${{ github.sha }}"
            export AI_ENGINE_IMAGE="ghcr.io/${{ github.repository }}/ai-engine:${SHA}"
            export BACKEND_IMAGE="ghcr.io/${{ github.repository }}/backend:${SHA}"
            export FRONTEND_IMAGE="ghcr.io/${{ github.repository }}/frontend:${SHA}"

            docker compose -f compose.prod.yml up -d --remove-orphans

            # Cleanup
            docker image prune -f

            echo "==> Deploy complete!"
            docker compose -f compose.prod.yml ps

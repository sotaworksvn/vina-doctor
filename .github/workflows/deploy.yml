name: Deploy to ECS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-ecs
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: AI Engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/ai-engine:latest,${{ env.IMAGE_PREFIX }}/ai-engine:${{ github.sha }}
          cache-from: type=gha,scope=ai-engine
          cache-to: type=gha,mode=max,scope=ai-engine

      - name: Backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:latest,${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:latest,${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to ECS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          envs: DASHSCOPE_API_KEY,SECRET_KEY,GITHUB_TOKEN,GITHUB_ACTOR,GITHUB_REPOSITORY,GITHUB_SHA
          script: |
            mkdir -p /opt/vina-doctor
            cd /opt/vina-doctor

            # Generate .env from secrets
            printf 'DASHSCOPE_API_KEY=%s\nSECRET_KEY=%s\n' \
              "${DASHSCOPE_API_KEY}" "${SECRET_KEY}" > .env

            # Pull production compose file from repo
            curl -sL "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/compose.prod.yml" -o compose.prod.yml

            # Login to GHCR
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            # Pull images with specific SHA tag for reproducibility
            export AI_ENGINE_IMAGE="ghcr.io/${GITHUB_REPOSITORY}/ai-engine:${GITHUB_SHA}"
            export BACKEND_IMAGE="ghcr.io/${GITHUB_REPOSITORY}/backend:${GITHUB_SHA}"
            export FRONTEND_IMAGE="ghcr.io/${GITHUB_REPOSITORY}/frontend:${GITHUB_SHA}"

            docker compose -f compose.prod.yml up -d --remove-orphans

            # Cleanup
            docker image prune -f

            echo "==> Deploy complete!"
            docker compose -f compose.prod.yml ps

services:
  # ── 1. AI Engine ────────────────────────────────────────────────────────────
  # FastAPI service that processes audio and produces SOAP notes via Qwen2-Audio.
  # Build context is the repo root (Dockerfile lives there).
  ai_engine:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - app-net
    restart: unless-stopped

  # ── 2. PostgreSQL ──────────────────────────────────────────────────────────
  # Relational database for auth, consultations, and reports.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vina_doctor
      POSTGRES_USER: vina
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"         # expose for local psql / Alembic migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vina -d vina_doctor"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-net
    restart: unless-stopped

  # ── 3. Backend ──────────────────────────────────────────────────────────────
  # FastAPI REST API for auth, consultation management, and report retrieval.
  # Calls ai_engine over the internal Docker network.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      # Internal service URLs
      AI_ENGINE_URL: http://ai_engine:8000
      # PostgreSQL connection — uses the compose service name as host
      DATABASE_URL: postgresql+asyncpg://vina:${POSTGRES_PASSWORD:-changeme}@postgres:5432/vina_doctor
      AUDIO_STORAGE_PATH: /data/audio_uploads
    volumes:
      - audio_data:/data/audio_uploads
    depends_on:
      ai_engine:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped

  # ── 4. Frontend ─────────────────────────────────────────────────────────────
  # Next.js app served from a minimal standalone build image.
  # For client-side API calls the browser uses localhost ports directly.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Public vars are inlined at build time; set them here if you rebuild the
      # image via `docker compose build` (or pass as build-args if preferred).
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8001
      NEXT_PUBLIC_AI_ENGINE_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - app-net
    restart: unless-stopped

# ── Shared network ─────────────────────────────────────────────────────────────
networks:
  app-net:
    driver: bridge

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  pg_data:        # PostgreSQL data directory
  audio_data:     # Backend audio file uploads

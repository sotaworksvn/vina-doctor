# Topology:
#   Internet → nginx:80 → /api/  → backend:8001
#                       → /v1/   → ai_engine:8000
#                       → /      → frontend:3000
#
# Use this file (`docker-compose.yml`) to run the entire system.
# Dev (build locally):  docker compose up --build
# Prod (pull from GHCR): docker compose pull && docker compose up -d
#
# Image tags can be overridden via env vars (default: :latest).
# Requires a .env file with DASHSCOPE_API_KEY and other secrets.

services:
  # ── 1. PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vina_doctor}
      POSTGRES_USER: ${POSTGRES_USER:-vina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vina_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-net
    restart: unless-stopped

  # ── 2. AI Engine ────────────────────────────────────────────────────────────
  # FastAPI service that processes audio and produces SOAP notes via Qwen2-Audio.
  # Build context is the repo root (Dockerfile lives there).
  ai_engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${AI_ENGINE_IMAGE:-ghcr.io/sotaworksvn/vina-doctor/ai-engine:latest}
    env_file:
      - .env
    networks:
      - app-net
    restart: unless-stopped


  # ── 3. Backend ──────────────────────────────────────────────────────────────
  # FastAPI REST API for auth, consultation management, and report retrieval.
  # Calls ai_engine over the internal Docker network.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-ghcr.io/sotaworksvn/vina-doctor/backend:latest}
    env_file:
      - .env
    environment:
      AI_ENGINE_URL: http://ai_engine:8000
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vina}:${POSTGRES_PASSWORD:-vina_secret}@postgres:5432/${POSTGRES_DB:-vina_doctor}
      AUDIO_STORAGE_PATH: /data/audio_uploads
    volumes:
      - audio_data:/data/audio_uploads
    depends_on:
      - ai_engine
      - postgres
    networks:
      - app-net
    restart: unless-stopped

  # ── 4. Frontend ─────────────────────────────────────────────────────────────
  # Next.js app served from a minimal standalone build image.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${FRONTEND_IMAGE:-ghcr.io/sotaworksvn/vina-doctor/frontend:latest}
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost/api
      NEXT_PUBLIC_AI_ENGINE_URL: http://localhost/v1
    depends_on:
      - backend
    networks:
      - app-net
    restart: unless-stopped

  # ── 5. Nginx ────────────────────────────────────────────────────────────────
  # Reverse proxy — the only service exposed to the host.
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - ai_engine
    networks:
      - app-net
    restart: unless-stopped

# ── Shared network ─────────────────────────────────────────────────────────────
networks:
  app-net:
    driver: bridge

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:    # PostgreSQL data directory
  audio_data:       # Audio file uploads

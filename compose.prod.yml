# Production compose file — pulls pre-built images from GHCR.
# Used on ECS via: docker compose -f compose.prod.yml up -d
#
# Set image tags via env vars or defaults to :latest.
# Requires a .env file with DASHSCOPE_API_KEY and other secrets.
#
# Topology:
#   Internet → nginx:80 → /api/  → backend:8001
#                       → /v1/   → ai_engine:8000
#                       → /      → frontend:3000
# backend and ai_engine are NOT exposed to the host; nginx is the only entry point.

services:
  ai_engine:
    image: ${AI_ENGINE_IMAGE:-ghcr.io/sotaworksvn/vina-doctor/ai-engine:latest}
    env_file:
      - .env
    networks:
      - app-net
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/sotaworksvn/vina-doctor/backend:latest}
    env_file:
      - .env
    environment:
      AI_ENGINE_URL: http://ai_engine:8000
      DATABASE_URL: sqlite+aiosqlite:////data/vina_doctor.db
      AUDIO_STORAGE_PATH: /data/audio_uploads
    volumes:
      - backend_data:/data
    depends_on:
      - ai_engine
    networks:
      - app-net
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/sotaworksvn/vina-doctor/frontend:latest}
    depends_on:
      - backend
    networks:
      - app-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - ai_engine
    networks:
      - app-net
    restart: unless-stopped

networks:
  app-net:
    driver: bridge

volumes:
  backend_data:
